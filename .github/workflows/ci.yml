name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run tests
        run: cargo test --verbose

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build
        run: cargo build --release --verbose
      - name: Rename binary
        shell: bash
        run: |
          cp target/release/jumping target/release/jumping-${{ matrix.os }}
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: jumping-${{ matrix.os }}
          path: target/release/jumping-${{ matrix.os }}

  release:
    name: Release
    needs: [ test, build ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # 再次确保权限在 job 级别也生效
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # GitHub v4 的 download-artifact 默认会将文件放在以 artifact name 命名的文件夹里
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded_artifacts

      - name: Prepare release binaries
        shell: bash
        run: |
          mkdir -p release_binaries
          # 注意：v4 插件下载后路径是 ./downloaded_artifacts/<name>/<filename>
          cp ./downloaded_artifacts/jumping-ubuntu-latest/jumping-ubuntu-latest release_binaries/jumping-linux
          cp ./downloaded_artifacts/jumping-macos-latest/jumping-macos-latest release_binaries/jumping-macos
          chmod +x release_binaries/*

      - name: Create release
        uses: softprops/action-gh-release@v2 # 建议升级到 v2
        with:
          files: |
            release_binaries/jumping-linux
            release_binaries/jumping-macos
          generate_release_notes: true
          # 显式指定 token
          token: ${{ secrets.GITHUB_TOKEN }}